services:
  db:
    image: postgres:15
    container_name: playto_db
    restart: always
    environment:
      POSTGRES_DB: payout_engine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: playto_redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: playto_web
    command: sh -c "python wait_for_db.py && python manage.py migrate && python
      manage.py shell -c 'from init_app import run; run()' && gunicorn
      core.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DB_NAME: payout_engine
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0

  celery:
    build: .
    container_name: playto_celery
    command: sh -c "python wait_for_db.py && celery -A core worker -l info"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      DB_NAME: payout_engine
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0

volumes:
  postgres_data:
